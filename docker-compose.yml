services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gemini-lead-classifier:latest
    container_name: gemini-lead-classifier
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./leads.json:/app/leads.json
      - ./plivo_cdr:/app/plivo_cdr
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
