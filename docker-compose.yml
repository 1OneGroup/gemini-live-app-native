services:
  app:
    image: ghcr.io/1onegroup/gemini-live-app-native:jatin
    container_name: gemini-lead-classifier
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - lead-data:/app/data
      - ./plivo_cdr:/app/plivo_cdr

volumes:
  lead-data:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
