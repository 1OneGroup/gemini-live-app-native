services:
  gemini-live-bridge:
    build: .
    container_name: gemini-live-bridge-avinash
    restart: unless-stopped
    ports:
      - "9000:8100"
      - "9001:5001"
    volumes:
      - call-data:/data/calls
      - prompt-data:/data
    env_file:
      - .env

volumes:
  call-data:
  prompt-data:
