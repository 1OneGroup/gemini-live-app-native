<!DOCTYPE html>
<html lang="en" data-theme="one-group">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f3ed">
  <title>Gemini Live — Lead Call Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-dot"></span>
      <div>
        <span class="brand-name">Gemini Live</span>
        <span class="brand-sub">Lead Call Classifier</span>
      </div>
    </div>
    <div class="navbar-actions">
      <button id="fetchCallsBtn" class="btn btn-secondary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Fetch New Calls
      </button>
      <button id="processAllBtn" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Process All New Calls
      </button>
      <button id="reclassifyInterestedBtn" class="btn btn-secondary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Sub-classify Interested
      </button>
    </div>
  </nav>

  <!-- ── PROGRESS BANNER ─────────────────────────────────────────────────── -->
  <div id="progressBanner" class="progress-banner hidden">
    <div class="progress-header">
      <span id="progressTitle">Processing...</span>
      <span id="progressStep"></span>
    </div>
    <div class="progress-track">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="progressLog" class="progress-log"></div>
  </div>

  <!-- ── OVERVIEW: CHART + STATS ─────────────────────────────────────────── -->
  <section class="overview">
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <h3 class="chart-title">Classification Breakdown</h3>
          <span class="chart-sub">Distribution across all leads</span>
        </div>
        <span id="chartTotalLabel" class="chart-total-label">0 leads</span>
      </div>
      <div class="chart-body">
        <div class="chart-svg-wrap">
          <svg id="donutChart" viewBox="0 0 120 120" width="180" height="180" aria-label="Classification donut chart">
            <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(20,20,19,0.06)" stroke-width="14"/>
            <g id="donutSegments" transform="rotate(-90 60 60)"></g>
            <text id="donutCenterNum" x="60" y="58" text-anchor="middle" class="donut-center-num">0</text>
            <text id="donutCenterLabel" x="60" y="74" text-anchor="middle" class="donut-center-label">total</text>
          </svg>
        </div>
        <ul id="chartLegend" class="chart-legend"></ul>
      </div>
    </div>
  </section>

  <!-- ── FILTER + SEARCH BAR ─────────────────────────────────────────────── -->
  <section class="controls">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="INTERESTED" onclick="setFilter('INTERESTED')">Interested</button>
      <button class="filter-btn" data-filter="VISITING" onclick="setFilter('VISITING')">Visiting</button>
      <button class="filter-btn" data-filter="NOT_VISITING" onclick="setFilter('NOT_VISITING')">Not Visiting</button>
      <button class="filter-btn" data-filter="NOT_INTERESTED" onclick="setFilter('NOT_INTERESTED')">Not Interested</button>
      <button class="filter-btn" data-filter="FOLLOW_UP_LATER" onclick="setFilter('FOLLOW_UP_LATER')">Follow Up Later</button>
      <button class="filter-btn" data-filter="review" onclick="setFilter('review')">Needs Review</button>
      <button class="filter-btn" data-filter="unprocessed" onclick="setFilter('unprocessed')">Unprocessed</button>
    </div>
    <div class="controls-right">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by phone number or keyword...">
      </div>
      <select id="sortSelect" class="sort-select" aria-label="Sort leads">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="duration-desc">Longest call</option>
        <option value="duration-asc">Shortest call</option>
        <option value="confidence-desc">Highest confidence</option>
        <option value="confidence-asc">Lowest confidence</option>
      </select>
      <select id="advancedFilter" class="sort-select" aria-label="Advanced filter">
        <option value="all">Any direction · any status</option>
        <option value="dir:inbound">Inbound only</option>
        <option value="dir:outbound">Outbound only</option>
        <option value="overridden">Manually overridden</option>
        <option value="not-overridden">Not overridden</option>
        <option value="has-recording">Has recording</option>
        <option value="no-transcript">Missing transcript</option>
        <option value="failed">Failed (transcribe/classify)</option>
      </select>
    </div>
  </section>

  <!-- ── LEADS GRID ──────────────────────────────────────────────────────── -->
  <main id="leadsGrid" class="leads-grid">
    <div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      <p>No leads yet. Click <strong>Fetch New Calls</strong> to get started.</p>
    </div>
  </main>

  <!-- ── LEAD DETAIL MODAL ─────────────────────────────────────────────── -->
  <div id="detailModal" class="modal-overlay hidden" onclick="closeDetailModal(event)">
    <div class="modal-box modal-box-detail">
      <div class="modal-header">
        <div>
          <h3 id="detailPhone">Lead Details</h3>
          <span id="detailMeta" class="modal-meta"></span>
        </div>
        <button class="modal-close" onclick="closeDetailModalDirect()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detailBody" class="detail-body"></div>
    </div>
  </div>

  <!-- ── TRANSCRIPT MODAL ────────────────────────────────────────────────── -->
  <div id="transcriptModal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <h3 id="modalPhone">Lead Transcript</h3>
          <span id="modalMeta" class="modal-meta"></span>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalTranscript" class="modal-transcript"></div>
    </div>
  </div>

  <!-- ── TOAST CONTAINER ─────────────────────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
